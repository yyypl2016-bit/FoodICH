<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What You See is What You Eat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #1a1a1a;
            --secondary-color: #f5f5f0;
            --accent-color: #c9a961;
            --text-dark: #2a2a2a;
            --text-light: #f5f5f0;
            --border-color: rgba(42, 42, 42, 0.1);
            --transition-duration: 0.4s;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-light);
        }

        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* 现代导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 24px 40px;
            background: linear-gradient(180deg, rgba(26, 26, 26, 0.95) 0%, rgba(26, 26, 26, 0) 100%);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .logo-text {
            font-family: 'Crimson Pro', serif;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--accent-color);
            line-height: 1;
        }

        .logo-subtitle {
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(201, 169, 97, 0.7);
            line-height: 1;
        }

        .nav-menu {
            display: none;
            gap: 40px;
            list-style: none;
        }

        .nav-menu.active {
            display: flex;
        }

        .nav-link {
            color: var(--text-light);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative;
            transition: color var(--transition-duration) ease;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent-color);
            transition: width var(--transition-duration) ease;
        }

        .nav-link:hover {
            color: var(--accent-color);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* 汉堡菜单 */
        .hamburger-menu {
            position: relative;
            z-index: 1001;
        }

        .hamburger-btn {
            width: 44px;
            height: 44px;
            background: transparent;
            border: 1px solid rgba(245, 245, 240, 0.3);
            border-radius: 4px;
            cursor: pointer;
            transition: all var(--transition-duration) ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
            gap: 5px;
        }

        .hamburger-btn:hover {
            border-color: var(--accent-color);
            background: rgba(201, 169, 97, 0.05);
        }

        .hamburger-line {
            width: 18px;
            height: 1px;
            background: var(--text-light);
            transition: all var(--transition-duration) ease;
        }

        .hamburger-btn.active .hamburger-line:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
        }

        .hamburger-btn.active .hamburger-line:nth-child(2) {
            opacity: 0;
        }

        .hamburger-btn.active .hamburger-line:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        .menu-dropdown {
            position: absolute;
            top: 60px;
            right: 0;
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.98) 0%, rgba(26, 26, 26, 0.95) 100%);
            border: 1px solid rgba(201, 169, 97, 0.2);
            border-radius: 4px;
            padding: 24px 0;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px) scaleY(0.95);
            transform-origin: top right;
            transition: all var(--transition-duration) ease;
            min-width: 200px;
        }

        .menu-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scaleY(1);
        }

        .menu-item {
            display: block;
            color: var(--text-light);
            text-decoration: none;
            padding: 12px 28px;
            transition: all var(--transition-duration) ease;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            position: relative;
            white-space: nowrap;
        }

        .menu-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--accent-color);
            transform: scaleY(0);
            transform-origin: center;
            transition: transform var(--transition-duration) ease;
        }

        .menu-item:hover {
            color: var(--accent-color);
            background: rgba(201, 169, 97, 0.08);
        }

        .menu-item:hover::before {
            transform: scaleY(1);
        }

        /* 3D内容区域 */
        #info {
            position: absolute;
            bottom: 60px;
            left: 40px;
            z-index: 100;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #info h2 {
            font-family: 'Crimson Pro', serif;
            font-size: clamp(28px, 5vw, 56px);
            font-weight: 400;
            line-height: 1.3;
            margin-bottom: 12px;
            color: var(--text-light);
            letter-spacing: -0.5px;
        }

        #info p {
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(201, 169, 97, 0.8);
            margin: 0;
        }

        /* 控制区域 */
        #controls {
            position: absolute;
            bottom: 40px;
            right: 40px;
            z-index: 100;
            text-align: right;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        #controls p {
            color: rgba(245, 245, 240, 0.6);
            font-size: 11px;
            letter-spacing: 0.5px;
            margin: 0 0 12px 0;
            line-height: 1.6;
            text-transform: uppercase;
        }

        .control-btn {
            background: rgba(201, 169, 97, 0.1);
            border: 1px solid rgba(201, 169, 97, 0.3);
            color: var(--accent-color);
            padding: 10px 20px;
            margin: 0;
            border-radius: 3px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all var(--transition-duration) ease;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .control-btn:hover {
            background: rgba(201, 169, 97, 0.15);
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(201, 169, 97, 0.1);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        /* 响应式设计 */
        @media (min-width: 768px) {
            .hamburger-menu {
                display: none;
            }

            .nav-menu {
                display: flex !important;
            }
        }

        @media (max-width: 767px) {
            .navbar {
                padding: 16px 20px;
            }

            .logo-text {
                font-size: 13px;
                letter-spacing: 1.5px;
            }

            .logo-subtitle {
                font-size: 9px;
            }

            #info {
                bottom: 120px;
                left: 20px;
                right: 20px;
            }

            #info h2 {
                font-size: clamp(20px, 6vw, 32px);
            }

            #controls {
                bottom: 20px;
                right: 20px;
                left: 20px;
                text-align: left;
            }

            .menu-dropdown {
                right: 20px;
                left: 20px;
                min-width: auto;
                transform: translateY(-10px) scaleY(0.95);
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="logo-section">
                <div class="logo-text">FoodICH</div>
                <div class="logo-subtitle">Narrative Food</div>
            </div>

            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="food.html" class="nav-link">Food</a></li>
                <li><a href="exhibition.html" class="nav-link">Exhibition</a></li>
                <li><a href="https://recfro.github.io/" class="nav-link" target="_blank">Studio</a></li>
                <li><a href="https://instagram.com/futuretensehk" class="nav-link" target="_blank">Instagram</a></li>
            </ul>

            <div class="hamburger-menu">
                <button class="hamburger-btn" onclick="toggleMenu()">
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                    <div class="hamburger-line"></div>
                </button>
                <div class="menu-dropdown" id="menuDropdown">
                    <a href="index.html" class="menu-item">Home</a>
                    <a href="about.html" class="menu-item">About</a>
                    <a href="food.html" class="menu-item">Food</a>
                    <a href="exhibition.html" class="menu-item">Exhibition</a>
                    <a href="https://recfro.github.io/" class="menu-item" target="_blank">Studio</a>
                    <a href="https://instagram.com/futuretensehk" class="menu-item" target="_blank">Instagram</a>
                </div>
            </div>
        </nav>

        <div id="info">
            <h2>What You See is What You Eat</h2>
            <p>Studio for Narrative Spaces</p>
        </div>

        <div id="controls">
            <p>Drag to rotate | Scroll to zoom</p>
            <button class="control-btn" onclick="resetCamera()">Reset View</button>
        </div>
    </div>
    
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/libs/fflate.min.js"></script>
    
    <script>
        // 全局变量
        let scene, camera, renderer, controls;
        let objects = [];
        let fbxModels = [];
        let textMesh;
        let animationId;
        let isAnimating = true;
        // 粒子颜色
        const particleColors = [0xff6b6b, 0xff2e8f, 0xff9021, 0x94ed5c, 0xfeca57, 0xff9ff3, 0xbaeaa9];
        
        // 鼠标交互相关变量
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let hoveredModel = null;
        let originalScale = {};
        let isHovering = false;
        
        function init() {
            // 创建场景
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0xff0000, 50, 200);
            
            // 创建相机
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 50);
            
            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('container').appendChild(renderer.domElement);
            
            // 添加控制器
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;
            
            // 添加光源
            addLights();
            
            // 创建几何体 - 已删除
            
            // 添加3D文字
            create3DText();
            
            // 加载FBX模型
            loadFBXModels();
            
            // 添加粒子系统
            addParticles();
            
            // 开始动画
            animate();
            
            // 监听窗口大小变化
            window.addEventListener('resize', onWindowResize, false);
            
            // 添加鼠标事件监听器
            renderer.domElement.addEventListener('mousemove', onMouseMove, false);
            renderer.domElement.addEventListener('click', onMouseClick, false);
            
            // 添加触摸事件监听器（移动端支持）
            renderer.domElement.addEventListener('touchstart', onTouchStart, false);
            renderer.domElement.addEventListener('touchmove', onTouchMove, false);
            renderer.domElement.addEventListener('touchend', onTouchEnd, false);
        }
        
        function addLights() {
            // 环境光 - 增强亮度，使用白色光
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
            scene.add(ambientLight);
            
            // 方向光 - 增强强度
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
            directionalLight.position.set(50, 50, 50);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);
            
            // 点光源 - 降低强度，避免过度影响颜色
            const pointLight1 = new THREE.PointLight(0xff6b6b, 0.3, 100);
            pointLight1.position.set(20, 20, 20);
            scene.add(pointLight1);
            
            const pointLight2 = new THREE.PointLight(0x4ecdc4, 0.3, 100);
            pointLight2.position.set(-20, -20, 20);
            scene.add(pointLight2);
        }
        
        // createGeometries函数已删除
        
        function create3DText() {
            const loader = new THREE.FontLoader();
            loader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json', function(font) {
                // Food-themed color palette
                // Tomato Red: #FF6347
                // Avocado Green: #568203
                // Chocolate Brown: #D2691E
                // Wheat/Gold: #F5DEB3 or #FECA57 (existing accent)

                // Define materials with food colors
                const tomatoMaterial = new THREE.MeshPhongMaterial({
                    color: 0xFF6347, // Tomato Red
                    shininess: 100,
                    transparent: true,
                    opacity: 0.95
                });

                const avocadoMaterial = new THREE.MeshPhongMaterial({
                    color: 0x568203, // Avocado Green
                    shininess: 100,
                    transparent: true,
                    opacity: 0.95
                });

                const chocolateMaterial = new THREE.MeshPhongMaterial({
                    color: 0xD2691E, // Chocolate Brown
                    shininess: 100,
                    transparent: true,
                    opacity: 0.95
                });

                const wheatMaterial = new THREE.MeshPhongMaterial({
                    color: 0xF5DEB3, // Wheat
                    shininess: 100,
                    transparent: true,
                    opacity: 0.95
                });

                // Map text lines to materials
                const textLines = [
                    { text: 'WHAT YOU', material: tomatoMaterial, height: 1 },
                    { text: 'SEE', material: avocadoMaterial, height: 4 },
                    { text: 'IS WHAT YOU', material: chocolateMaterial, height: 1 },
                    { text: 'EAT', material: wheatMaterial, height: 4 }
                ];
                
                const textGroup = new THREE.Group();
                const lineHeight = 4; // Line spacing
                const totalHeight = (textLines.length - 1) * lineHeight;
                
                textLines.forEach((line, index) => {
                    const textGeometry = new THREE.TextGeometry(line.text, {
                        font: font,
                        size: 3,
                        height: line.height,
                        curveSegments: 12,
                        bevelEnabled: true,
                        bevelThickness: 0.1,
                        bevelSize: 0.1,
                        bevelOffset: 0,
                        bevelSegments: 5
                    });
                    
                    // Center the text
                    textGeometry.computeBoundingBox();
                    const box = textGeometry.boundingBox;
                    const centerOffsetX = -0.5 * (box.max.x - box.min.x);
                    const centerOffsetZ = -0.5 * (box.max.z - box.min.z);
                    
                    textGeometry.translate(centerOffsetX, 0, centerOffsetZ);
                    
                    const textMesh = new THREE.Mesh(textGeometry, line.material);
                    
                    // Set vertical position
                    textMesh.position.y = (totalHeight / 2) - (index * lineHeight);
                    textMesh.castShadow = true;
                    textMesh.receiveShadow = true;
                    
                    textGroup.add(textMesh);
                });
                
                textGroup.position.set(0, 0, 0);
                scene.add(textGroup);
                
                // Assign to global variable
                textMesh = textGroup;
            });
        }
        
        function loadFBXModels() {
            console.log('开始加载FBX模型...');
            const loader = new THREE.FBXLoader();
            const modelPaths = ['../models/claypot-rice.fbx', '../models/healthy-ribs.fbx', '../models/spicy-ribs.fbx', '../models/garden-tofu.fbx', '../models/preserved-veg-pork.fbx', '../models/meat-bun.fbx', '../models/vermicelli-shrimp.fbx'];
            const modelLinks = ['claypot.html', 'food.html', 'food.html', 'food.html', 'food.html', 'food.html', 'food.html'];
            
            modelPaths.forEach((path, index) => {
                console.log('正在加载模型:', path);
                loader.load(path, function(object) {
                    console.log('模型加载成功:', path, object);
                    
                    // 设置模型大小 - 缩小模型
                    object.scale.setScalar(0.08);
                    
                    // 设置模型旋转 - x轴旋转80度让顶部面向屏幕
                    object.rotation.x = Math.PI * 40 / 180; // 80度转换为弧度
                    
                    // 设置初始位置（围绕中心的圆形排列）
                    const angle = (index / modelPaths.length) * Math.PI * 2;
                    const radius = 30;
                    object.position.x = Math.cos(angle) * radius;
                    object.position.z = Math.sin(angle) * radius;
                    object.position.y = 0;
                    
                    console.log('模型位置设置为:', object.position);
                    
                    // 添加自定义属性用于旋转动画
                    object.userData = {
                        angle: angle,
                        radius: radius,
                        rotationSpeed: 0.002,
                        originalScale: 0.08,
                        link: modelLinks[index] || 'food.html',
                        isHovered: false
                    };
                    
                    // 保存原始缩放值
                    originalScale[object.uuid] = 0.08;
                    
                    object.castShadow = true;
                    object.receiveShadow = true;
                    
                    // 遍历模型的所有子对象，设置材质
                    object.traverse(function(child) {
                        if (child.isMesh) {
                            console.log('找到网格:', child);
                            child.castShadow = true;
                            child.receiveShadow = true;
                            if (child.material) {
                                // 处理单个材质
                                if (!Array.isArray(child.material)) {
                                    // 修复UV映射问题
                                    if (child.material.map) {
                                        // FBX模型通常需要flipY为true来正确显示UV
                                        child.material.map.flipY = true;
                                        child.material.map.wrapS = THREE.RepeatWrapping;
                                        child.material.map.wrapT = THREE.RepeatWrapping;
                                        child.material.map.needsUpdate = true;
                                    }
                                    // 处理法线贴图
                                    if (child.material.normalMap) {
                                        child.material.normalMap.flipY = true;
                                        child.material.normalMap.wrapS = THREE.RepeatWrapping;
                                        child.material.normalMap.wrapT = THREE.RepeatWrapping;
                                        child.material.normalMap.needsUpdate = true;
                                    }
                                    // 处理粗糙度贴图
                                    if (child.material.roughnessMap) {
                                        child.material.roughnessMap.flipY = true;
                                        child.material.roughnessMap.wrapS = THREE.RepeatWrapping;
                                        child.material.roughnessMap.wrapT = THREE.RepeatWrapping;
                                        child.material.roughnessMap.needsUpdate = true;
                                    }
                                    child.material.needsUpdate = true;
                                } else {
                                    // 处理材质数组
                                    child.material.forEach(mat => {
                                        if (mat.map) {
                                            mat.map.flipY = true;
                                            mat.map.wrapS = THREE.RepeatWrapping;
                                            mat.map.wrapT = THREE.RepeatWrapping;
                                            mat.map.needsUpdate = true;
                                        }
                                        if (mat.normalMap) {
                                            mat.normalMap.flipY = true;
                                            mat.normalMap.wrapS = THREE.RepeatWrapping;
                                            mat.normalMap.wrapT = THREE.RepeatWrapping;
                                            mat.normalMap.needsUpdate = true;
                                        }
                                        if (mat.roughnessMap) {
                                            mat.roughnessMap.flipY = true;
                                            mat.roughnessMap.wrapS = THREE.RepeatWrapping;
                                            mat.roughnessMap.wrapT = THREE.RepeatWrapping;
                                            mat.roughnessMap.needsUpdate = true;
                                        }
                                        mat.needsUpdate = true;
                                    });
                                }
                            }
                        }
                    });
                    
                    scene.add(object);
                    fbxModels.push(object);
                    console.log('模型已添加到场景，当前FBX模型数量:', fbxModels.length);
                }, function(progress) {
                    if (progress.total > 0) {
                        console.log('加载进度 ' + path + ':', (progress.loaded / progress.total * 100) + '%');
                    }
                }, function(error) {
                    console.error('加载FBX模型失败:', path, error);
                    // 如果FBX加载失败，创建一个替代的几何体
                    const geometry = new THREE.BoxGeometry(2, 2, 2);
                    const material = new THREE.MeshPhongMaterial({ color: 0xff6b6b });
                    const cube = new THREE.Mesh(geometry, material);
                    
                    // 设置模型旋转 - x轴旋转80度让顶部面向屏幕
                    cube.rotation.x = Math.PI * 1 / 180; // 80度转换为弧度
                    
                    const angle = (index / modelPaths.length) * Math.PI * 2;
                    const radius = 30;
                    cube.position.x = Math.cos(angle) * radius;
                    cube.position.z = Math.sin(angle) * radius;
                    cube.position.y = 0;
                    
                    cube.userData = {
                        angle: angle,
                        radius: radius,
                        rotationSpeed: 0.01,
                        originalScale: 1,
                        link: modelLinks[index] || 'food.html',
                        isHovered: false
                    };
                    
                    // 保存原始缩放值
                    originalScale[cube.uuid] = 1;
                    
                    scene.add(cube);
                    fbxModels.push(cube);
                    console.log('已添加替代几何体');
                });
            });
        }
        
        function addParticles() {
            const particleCount = 1000;
            const particles = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 200;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 200;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 200;
                
                const color = new THREE.Color(particleColors[Math.floor(Math.random() * particleColors.length)]);
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;
            }
            
            particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particles.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const particleMaterial = new THREE.PointsMaterial({
                size: 2,
                vertexColors: true,
                transparent: true,
                opacity: 0.6
            });
            
            const particleSystem = new THREE.Points(particles, particleMaterial);
            scene.add(particleSystem);
            objects.push(particleSystem);
        }
        
        function animate() {
            if (isAnimating) {
                animationId = requestAnimationFrame(animate);
            }
            
            const time = Date.now() * 0.001;
            
            // 只有在非悬停状态下才执行动画
            if (!isHovering) {
                // 更新粒子系统动画
                objects.forEach((obj, index) => {
                    if (obj.type === 'Points') {
                        // 粒子系统旋转
                        obj.rotation.y += 0.001;
                    }
                });
                
                // 更新3D文字动画
                if (textMesh) {
                    // 让文字始终面向相机
                    textMesh.lookAt(camera.position);
                    // 保持在中心位置，只有轻微的上下飘浮
                    textMesh.position.y = Math.sin(time * 0.5) * 1;
                }
                
                // 更新FBX模型围绕文字旋转
                fbxModels.forEach((model, index) => {
                    if (model.userData && !model.userData.isHovered) {
                        model.userData.angle += model.userData.rotationSpeed;
                        model.position.x = Math.cos(model.userData.angle) * model.userData.radius;
                        model.position.z = Math.sin(model.userData.angle) * model.userData.radius;
                        model.position.y = Math.sin(time * 0.3 + index) * 6;
                        
                        // 模型自身旋转
                        model.rotation.y += 0.01;
                    }
                });
                
                // 更新控制器自动旋转
                if (controls.autoRotate) {
                    controls.update();
                }
            } else {
                // 悬停状态下仍需要更新控制器但不自动旋转
                const wasAutoRotate = controls.autoRotate;
                controls.autoRotate = false;
                controls.update();
                controls.autoRotate = wasAutoRotate;
            }
            
            // 渲染
            renderer.render(scene, camera);
        }
        
        function toggleAnimation() {
            isAnimating = !isAnimating;
            if (isAnimating) {
                animate();
            } else {
                cancelAnimationFrame(animationId);
            }
        }
        

        
        function resetCamera() {
            camera.position.set(0, 0, 50);
            controls.reset();
        }
        
        // 汉堡菜单功能
        function toggleMenu() {
            const hamburgerBtn = document.querySelector('.hamburger-btn');
            const menuDropdown = document.getElementById('menuDropdown');
            
            hamburgerBtn.classList.toggle('active');
            menuDropdown.classList.toggle('show');
        }
        
        // 点击页面其他地方关闭菜单
        document.addEventListener('click', function(event) {
            const hamburgerMenu = document.querySelector('.hamburger-menu');
            const menuDropdown = document.getElementById('menuDropdown');
            const hamburgerBtn = document.querySelector('.hamburger-btn');
            
            if (!hamburgerMenu.contains(event.target)) {
                menuDropdown.classList.remove('show');
                hamburgerBtn.classList.remove('active');
            }
        });
        
        // 阻止菜单内部点击事件冒泡
        document.querySelector('.hamburger-menu').addEventListener('click', function(event) {
            event.stopPropagation();
        });
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 统一的坐标处理函数
        function getEventCoordinates(event) {
            let clientX, clientY;
            
            if (event.touches && event.touches.length > 0) {
                // 触摸事件
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else if (event.changedTouches && event.changedTouches.length > 0) {
                // touchend事件
                clientX = event.changedTouches[0].clientX;
                clientY = event.changedTouches[0].clientY;
            } else {
                // 鼠标事件
                clientX = event.clientX;
                clientY = event.clientY;
            }
            
            return {
                x: (clientX / window.innerWidth) * 2 - 1,
                y: -(clientY / window.innerHeight) * 2 + 1
            };
        }
        
        // 统一的交互检测函数
        function checkModelIntersection(event) {
            const coords = getEventCoordinates(event);
            mouse.x = coords.x;
            mouse.y = coords.y;
            
            // 更新射线
            raycaster.setFromCamera(mouse, camera);
            
            // 检测与FBX模型的交集
            const intersects = raycaster.intersectObjects(fbxModels, true);
            
            if (intersects.length > 0) {
                // 找到最近的模型
                let targetModel = intersects[0].object;
                while (targetModel.parent && !fbxModels.includes(targetModel)) {
                    targetModel = targetModel.parent;
                }
                
                if (fbxModels.includes(targetModel)) {
                    return targetModel;
                }
            }
            
            return null;
        }
        
        // 鼠标移动事件处理
        function onMouseMove(event) {
            const targetModel = checkModelIntersection(event);
            
            if (targetModel) {
                if (hoveredModel !== targetModel) {
                    // 恢复之前悬停的模型
                    if (hoveredModel) {
                        resetModelState(hoveredModel);
                    }
                    
                    // 设置新的悬停模型
                    hoveredModel = targetModel;
                    setModelHovered(hoveredModel);
                }
                
                // 设置鼠标样式
                renderer.domElement.style.cursor = 'pointer';
                isHovering = true;
            } else {
                // 没有悬停任何模型
                if (hoveredModel) {
                    resetModelState(hoveredModel);
                    hoveredModel = null;
                }
                renderer.domElement.style.cursor = 'default';
                isHovering = false;
            }
        }
        
        // 鼠标点击事件处理
        function onMouseClick(event) {
            if (hoveredModel) {
                // 根据模型跳转到对应页面
                navigateToModel(hoveredModel);
            }
        }
        
        // 触摸开始事件处理（移动端）
        function onTouchStart(event) {
            event.preventDefault(); // 防止默认的触摸行为
            
            const targetModel = checkModelIntersection(event);
            
            if (targetModel) {
                // 恢复之前悬停的模型
                if (hoveredModel && hoveredModel !== targetModel) {
                    resetModelState(hoveredModel);
                }
                
                // 设置新的悬停模型
                hoveredModel = targetModel;
                setModelHovered(hoveredModel);
                isHovering = true;
            }
        }
        
        // 触摸移动事件处理（移动端）
        function onTouchMove(event) {
            event.preventDefault(); // 防止页面滚动
            
            const targetModel = checkModelIntersection(event);
            
            if (targetModel) {
                if (hoveredModel !== targetModel) {
                    // 恢复之前悬停的模型
                    if (hoveredModel) {
                        resetModelState(hoveredModel);
                    }
                    
                    // 设置新的悬停模型
                    hoveredModel = targetModel;
                    setModelHovered(hoveredModel);
                }
                isHovering = true;
            } else {
                // 没有触摸任何模型
                if (hoveredModel) {
                    resetModelState(hoveredModel);
                    hoveredModel = null;
                }
                isHovering = false;
            }
        }
        
        // 触摸结束事件处理（移动端）
        function onTouchEnd(event) {
            event.preventDefault();
            
            // 检查触摸结束时是否还在模型上
            const targetModel = checkModelIntersection(event);
            
            if (targetModel && hoveredModel === targetModel) {
                // 如果触摸结束时还在同一个模型上，则执行点击跳转
                navigateToModel(targetModel);
            }
            
            // 重置悬停状态
            if (hoveredModel) {
                resetModelState(hoveredModel);
                hoveredModel = null;
            }
            isHovering = false;
        }
        
        function navigateToModel(model) {
            if (model && model.userData) {
                const target = model.userData.link || 'food.html';
                window.location.href = target;
            }
        }

        // 设置模型为悬停状态
        function setModelHovered(model) {
            if (model.userData) {
                model.userData.isHovered = true;
                
                // 放大模型
                const targetScale = model.userData.originalScale * 1.2;
                model.scale.setScalar(targetScale);
                
                // 添加发光效果
                model.traverse(function(child) {
                    if (child.isMesh && child.material) {
                        if (Array.isArray(child.material)) {
                            child.material.forEach(mat => {
                                mat.emissive = new THREE.Color(0x444444);
                                mat.needsUpdate = true;
                            });
                        } else {
                            child.material.emissive = new THREE.Color(0x444444);
                            child.material.needsUpdate = true;
                        }
                    }
                });
            }
        }
        
        // 重置模型状态
        function resetModelState(model) {
            if (model.userData) {
                model.userData.isHovered = false;
                
                // 恢复原始大小
                model.scale.setScalar(model.userData.originalScale);
                
                // 移除发光效果
                model.traverse(function(child) {
                    if (child.isMesh && child.material) {
                        if (Array.isArray(child.material)) {
                            child.material.forEach(mat => {
                                mat.emissive = new THREE.Color(0x000000);
                                mat.needsUpdate = true;
                            });
                        } else {
                            child.material.emissive = new THREE.Color(0x000000);
                            child.material.needsUpdate = true;
                        }
                    }
                });
            }
        }
        
        // 初始化
        init();
    </script>
</body>
</html>
