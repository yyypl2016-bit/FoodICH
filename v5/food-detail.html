<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Detail - What You See is What You Eat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/detail.css">
</head>
<body class="detail-page">

    <!-- Navigation -->
    <div class="hamburger-menu">
        <button class="hamburger-btn" onclick="toggleMenu()">
            <div class="hamburger-line"></div>
            <div class="hamburger-line"></div>
            <div class="hamburger-line"></div>
        </button>
        <div class="menu-dropdown" id="menuDropdown">
            <a href="index.html" class="menu-item">Home</a>
            <a href="about.html" class="menu-item">Team</a>
            <a href="exhibition.html" class="menu-item">Exhibition</a>
            <a href="https://recfro.github.io/" class="menu-item" target="_blank">Studio</a>
            <a href="https://instagram.com/futuretensehk" class="menu-item" target="_blank">Instagram</a>
        </div>
    </div>

    <!-- Back Button -->
    <button class="detail-back-btn" onclick="history.back()">
        <span>←</span> Back
    </button>

    <!-- Particle Background -->
    <canvas id="detail-particle-canvas"></canvas>

    <div class="detail-desktop-bg">
        <div class="desktop-label" id="desktopLabel"></div>
    </div>

    <main class="detail-layout">
        <section class="detail-header">
            <div class="detail-header-number" id="titleCardNumber"></div>
            <div class="detail-header-main">
                <h1 class="detail-header-zh" id="titleCardZh"></h1>
                <div class="detail-header-en" id="titleCardEn"></div>
            </div>
            <div class="detail-header-location" id="titleCardLocation"></div>
        </section>

        <section class="detail-grid">
            <article class="detail-panel" id="win-video">
                <div class="detail-panel-title" id="winVideoTitle">視頻</div>
                <div class="detail-panel-body detail-panel-video">
                    <video id="winVideo" controls muted loop playsinline preload="none">
                        <source id="winVideoSrc" src="" type="video/mp4">
                    </video>
                </div>
            </article>

            <article class="detail-panel" id="win-model">
                <div class="detail-panel-title">3D 模型</div>
                <div class="detail-panel-body detail-panel-model">
                    <div class="model-stage" id="winModelStage">
                        <div class="model-status" id="winModelStatus">Loading 3D model...</div>
                    </div>
                </div>
            </article>

            <article class="detail-panel" id="win-display">
                <div class="detail-panel-title" id="winDisplayTitle">圖片展示</div>
                <div class="detail-panel-body detail-panel-image detail-panel-display">
                    <div class="detail-display-wall" id="winDisplayWall"></div>
                </div>
            </article>

            <article class="detail-panel" id="win-gallery">
                <div class="detail-panel-title" id="winGalleryTitle">圖頁</div>
                <div class="detail-panel-body detail-panel-gallery">
                    <div class="gallery-grid" id="winGalleryGrid"></div>
                </div>
            </article>

            <article class="detail-panel" id="win-desc">
                <div class="detail-panel-title">簡介</div>
                <div class="detail-panel-body detail-panel-scroll">
                    <div class="win-desc-content" id="winDescContent"></div>
                </div>
            </article>

            <article class="detail-panel" id="win-info">
                <div class="detail-panel-title">採訪碎片</div>
                <div class="detail-panel-body detail-panel-scroll">
                    <div class="fragment-list" id="winInfoCard"></div>
                </div>
            </article>
        </section>
    </main>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/libs/fflate.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/detail.js"></script>
</body>
</html>
