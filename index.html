    <!-- Three.js & Scripts -->
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/libs/fflate.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script src="js/main.js"></script>
    <script>
        // Debug Console Logic
        const logContainer = document.createElement('div');
        logContainer.id = 'debug-console';
        logContainer.style.cssText = 'position:fixed;top:0;left:0;width:100%;max-height:50%;overflow-y:auto;background:rgba(0,0,0,0.7);color:lime;font-family:monospace;padding:10px;z-index:999999;pointer-events:none;display:none;';
        document.head.appendChild(logContainer);
        
        function showConsole() {
            if (!document.body.contains(logContainer)) document.body.appendChild(logContainer);
            logContainer.style.display = 'block';
        }

        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        function appendLog(type, args) {
            const msg = args.map(arg => {
                if (arg instanceof Error) return arg.stack || arg.message;
                if (typeof arg === 'object') return JSON.stringify(arg);
                return String(arg);
            }).join(' ');
            
            const line = document.createElement('div');
            line.style.color = type === 'error' ? '#ff5555' : (type === 'warn' ? '#ffca28' : '#55ff55');
            line.textContent = `[${type.toUpperCase()}] ${msg}`;
            logContainer.appendChild(line);
            logContainer.scrollTop = logContainer.scrollHeight;

            if (type === 'error') showConsole();
        }

        console.log = function(...args) { originalLog.apply(console, args); appendLog('log', args); };
        console.error = function(...args) { originalError.apply(console, args); appendLog('error', args); };
        console.warn = function(...args) { originalWarn.apply(console, args); appendLog('warn', args); };
        window.onerror = function(msg, url, line, col, error) { appendLog('error', [`Global Error: ${msg} at ${line}:${col}`, error]); return false; };
    </script>

    <script>
        // UI Logic (Moved to main.js) - Keeping 3D Logic below

        // 3D Logic
        const foodItems = [
            {
                name: "煲仔飯 Clay Pot Rice",
                model: "models/claypot-rice.fbx",
                link: "claypot.html",
                scale: 0.04
            },
            {
                name: "流汁湯包 Steam Buns",
                model: "models/meat-bun.fbx",
                link: "steam-buns.html",
                scale: 0.04
            },
            {
                name: "客家釀豆腐 Hakka Tofu",
                model: "models/garden-tofu.fbx",
                link: "hakka-tofu.html",
                scale: 0.04
            }
        ];

        const config = {
            radius: 8,
            itemCount: 9,
            autoRotateSpeed: 0.8
        };

        const PHYSICS = {
            friction: 0.92,
            restitution: 0.5,
            springStiffness: 0.05,
            repulsionStrength: 0.8,
            colliderRadius: 3.5,
            interactionRadius: 4.5,
            predictionFrames: 20,    // N frames prediction
            maxSteerForce: 0.05,     // Max adjustment force
            maxSpeedDev: 0.15        // Max speed deviation
        };

        let scene, camera, renderer, controls;
        let rings = []; // Store multiple rings
        let allItems = []; // Flat list for collision check
        let raycaster, mouse;
        let clickableObjects = [];
        let particleSystem;
        let centralTextMesh;
        let centralTextCollider;

        function init() {
            scene = new THREE.Scene();
            scene.background = null; 
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 16);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.sortObjects = true; // Ensure correct Z-sorting
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = false;
            controls.autoRotateSpeed = config.autoRotateSpeed;
            controls.enablePan = false;
            controls.minDistance = 5;
            controls.maxDistance = 30;
            controls.maxPolarAngle = Math.PI / 1.5;
            controls.minPolarAngle = Math.PI / 3;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);
            
            // Add point lights to highlight copper material
            const pLight1 = new THREE.PointLight(0xffaa00, 1, 50);
            pLight1.position.set(-10, 5, 10);
            scene.add(pLight1);

            const pLight2 = new THREE.PointLight(0x00aaff, 0.5, 50);
            pLight2.position.set(10, -5, 10);
            scene.add(pLight2);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            window.addEventListener('click', onMouseClick, false);
            window.addEventListener('mousemove', onMouseMove, false);
            window.addEventListener('resize', onWindowResize, false);

            loadAndCreateOrbitItems();
            createCentralText();
            initParticles();
            animate();
        }

        function createCentralText() {
            const loader = new THREE.FontLoader();
            loader.load('https://unpkg.com/three@0.128.0/examples/fonts/helvetiker_bold.typeface.json', function (font) {
                const textGeo = new THREE.TextGeometry('WHAT YOU SEE\nIS WHAT YOU EAT', {
                    font: font,
                    size: 1.5,
                    height: 0.2,
                    curveSegments: 12,
                    bevelEnabled: true,
                    bevelThickness: 0.03,
                    bevelSize: 0.02,
                    bevelOffset: 0,
                    bevelSegments: 5
                });

                textGeo.computeBoundingBox();
                const centerOffset = - 0.5 * (textGeo.boundingBox.max.x - textGeo.boundingBox.min.x);
                const centerOffsetY = - 0.5 * (textGeo.boundingBox.max.y - textGeo.boundingBox.min.y);
                textGeo.translate(centerOffset, centerOffsetY, 0);

                const copperMaterial = new THREE.MeshPhysicalMaterial({
                    color: 0xb87333,
                    metalness: 0.9,
                    roughness: 0.4,
                    clearcoat: 0.1,
                    clearcoatRoughness: 0.1,
                    reflectivity: 1
                });

                centralTextMesh = new THREE.Mesh(textGeo, copperMaterial);
                centralTextMesh.position.set(0, 0, 0);
                centralTextMesh.castShadow = true;
                centralTextMesh.receiveShadow = true;
                scene.add(centralTextMesh);

                // Add Collider for Central Text
                const box = new THREE.Box3().setFromObject(centralTextMesh);
                const size = new THREE.Vector3();
                box.getSize(size);
                
                // Invisible collider for physics
                const geometry = new THREE.BoxGeometry(size.x + 1, size.y + 1, size.z + 1);
                centralTextCollider = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ visible: false }));
                centralTextCollider.position.copy(centralTextMesh.position);
                scene.add(centralTextCollider);
            });
        }

        function loadAndCreateOrbitItems() {
            // No single group anymore, using rings array
            
            const loader = new THREE.FBXLoader();
            const modelsCache = {};
            let processedModels = 0;
            const totalModels = foodItems.length;

            if (totalModels === 0) {
                buildOrbit(modelsCache);
                hideLoading();
                return;
            }

            foodItems.forEach(item => {
                loader.load(item.model, (object) => {
                    object.traverse(child => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            if (child.material) {
                                const mats = Array.isArray(child.material) ? child.material : [child.material];
                                mats.forEach(mat => {
                                    if (mat.map) mat.map.flipY = true;
                                    if (mat.normalMap) mat.normalMap.flipY = true;
                                    if (mat.roughnessMap) mat.roughnessMap.flipY = true;
                                });
                            }
                        }
                    });
                    
                    // Normalize Scale and Center
                    const box = new THREE.Box3().setFromObject(object);
                    const size = new THREE.Vector3();
                    box.getSize(size);
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scaleFactor = 4 / maxDim; // Normalize to ~4 units
                    object.scale.setScalar(scaleFactor);
                    
                    modelsCache[item.model] = object;
                    processedModels++;
                    checkCompletion();
                }, undefined, (err) => {
                    console.error('Failed to load', item.model, err);
                    processedModels++;
                    checkCompletion();
                });
            });

            function checkCompletion() {
                if (processedModels === totalModels) {
                    buildOrbit(modelsCache);
                    hideLoading();
                }
            }
        }

        function hideLoading() {
            const loadingEl = document.getElementById('loading');
            if (loadingEl) {
                loadingEl.style.opacity = 0;
                setTimeout(() => loadingEl.style.display = 'none', 500);
            }
        }

        function buildOrbit(modelsCache) {
            // Multi-ring configuration
            const ringConfigs = [
                { radius: 10, speed: 0.002, axis: new THREE.Vector3(0, 1, 0.2).normalize(), items: [] },
                { radius: 14, speed: -0.0015, axis: new THREE.Vector3(0.2, 1, -0.1).normalize(), items: [] },
                { radius: 18, speed: 0.001, axis: new THREE.Vector3(-0.1, 1, 0.3).normalize(), items: [] }
            ];

            // Assign items to rings
            for (let i = 0; i < config.itemCount; i++) {
                const dataIndex = i % foodItems.length;
                const ringIndex = i % ringConfigs.length;
                ringConfigs[ringIndex].items.push(foodItems[dataIndex]);
            }

            // Create rings
            ringConfigs.forEach((ringConf, index) => {
                const ringGroup = new THREE.Group();
                
                const tiltContainer = new THREE.Group();
                const quaternion = new THREE.Quaternion();
                quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), ringConf.axis);
                tiltContainer.setRotationFromQuaternion(quaternion);
                
                scene.add(tiltContainer);
                
                const rotatingRing = new THREE.Group();
                rotatingRing.userData = { rotationSpeed: ringConf.speed };
                tiltContainer.add(rotatingRing);
                rings.push(rotatingRing);

                const itemsCount = ringConf.items.length;
                ringConf.items.forEach((data, i) => {
                    if (!modelsCache[data.model]) return;

                    const model = modelsCache[data.model].clone();
                    
                    // Distribute along the ring
                    const angle = (i / itemsCount) * Math.PI * 2;
                    const x = Math.sin(angle) * ringConf.radius;
                    const z = Math.cos(angle) * ringConf.radius;

                    const itemContainer = new THREE.Group();
                    // Store initial orbit position
                    itemContainer.userData = {
                        orbitPos: new THREE.Vector3(x, 0, z),
                        velocity: new THREE.Vector3(0, 0, 0),
                        link: data.link,
                        rotationAxis: new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize(),
                        rotationSpeed: 0.002 + Math.random() * 0.003,
                        radius: PHYSICS.colliderRadius // For collision
                    };
                    itemContainer.position.copy(itemContainer.userData.orbitPos);
                    
                    itemContainer.lookAt(0, 0, 0);

                    model.position.y = -1;
                    model.rotation.y = Math.PI;

                    itemContainer.add(model);

                    const labelTexture = createLabelTexture(data.name);
                    const labelMaterial = new THREE.SpriteMaterial({ 
                        map: labelTexture, 
                        transparent: true,
                        depthWrite: false // Fix Z-fighting/sorting with transparent objects
                    });
                    const labelSprite = new THREE.Sprite(labelMaterial);
                    labelSprite.position.set(0, 3.5, 0); // Raised slightly higher
                    labelSprite.scale.set(4, 2, 1);
                    labelSprite.renderOrder = 999; // Ensure text is always on top of models
                    itemContainer.add(labelSprite);

                    // Add debug collider (invisible)
                    // const debugGeo = new THREE.SphereGeometry(PHYSICS.colliderRadius, 16, 16);
                    // const debugMat = new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true, visible: false });
                    // const debugSphere = new THREE.Mesh(debugGeo, debugMat);
                    // itemContainer.add(debugSphere);

                    rotatingRing.add(itemContainer);
                    allItems.push(itemContainer);
                });
            });
        }

        function createLabelTexture(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            ctx.font = 'bold 40px Arial';
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = "rgba(0,0,0,0.8)";
            ctx.shadowBlur = 10;
            
            const words = text.split(' ');
            let line1 = '', line2 = '';
            
            if (words.length > 2) {
                line1 = words.slice(0, 2).join(' ');
                line2 = words.slice(2).join(' ');
            } else {
                line1 = text;
            }
            
            ctx.fillText(line1, 256, 100);
            if (line2) {
                ctx.font = '30px Arial';
                ctx.fillStyle = '#feca57';
                ctx.fillText(line2, 256, 160);
            }
            
            return new THREE.CanvasTexture(canvas);
        }

        function initParticles() {
            // ... (Same as before, simplified to avoid duplication if main.js covers it, but keeping for index specific look)
            // Assuming main.js handles global particles, we can skip or keep. 
            // The user didn't ask to remove it, but main.js has one too.
            // Let's keep the existing one in index.html as it might be specific.
            const particleColors = [0xff6b6b, 0xff2e8f, 0xff9021, 0x94ed5c, 0xfeca57, 0xff9ff3, 0xbaeaa9];
            const particleGeometry = new THREE.BufferGeometry();
            const particleCount = 600;
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 40;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 40;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 40;

                const color = new THREE.Color(particleColors[Math.floor(Math.random() * particleColors.length)]);
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;
            }

            particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const particleMaterial = new THREE.PointsMaterial({
                size: 0.2,
                vertexColors: true,
                transparent: true,
                opacity: 0.6
            });

            particleSystem = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particleSystem);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            document.body.style.cursor = 'default';
            raycaster.setFromCamera(mouse, camera);
            
            const interactiveItems = [];
            rings.forEach(ring => {
                interactiveItems.push(...ring.children);
            });
            
            const intersects = raycaster.intersectObjects(interactiveItems, true);
            
            if (intersects.length > 0) {
                let target = intersects[0].object;
                while (target) {
                    if (target.userData && target.userData.link) {
                        document.body.style.cursor = 'pointer';
                        return;
                    }
                    target = target.parent;
                }
            }
        }

        function onMouseClick(event) {
            raycaster.setFromCamera(mouse, camera);
            
            const interactiveItems = [];
            rings.forEach(ring => {
                interactiveItems.push(...ring.children);
            });
            
            const intersects = raycaster.intersectObjects(interactiveItems, true);

            if (intersects.length > 0) {
                let target = intersects[0].object;
                while (target) {
                    if (target.userData && target.userData.link) {
                        window.location.href = target.userData.link;
                        return;
                    }
                    target = target.parent;
                }
            }
        }

        function updatePhysics() {
            const startTime = performance.now();

            // 1. Snapshot State & Pre-calculate World Data
            const state = allItems.map(item => {
                const worldPos = new THREE.Vector3();
                item.getWorldPosition(worldPos);
                
                // Get Parent (Ring) Orbit Data
                // item.parent is RotatingRing. item.parent.parent is TiltContainer.
                const tiltContainer = item.parent.parent;
                const axis = new THREE.Vector3(0, 1, 0).applyQuaternion(tiltContainer.quaternion).normalize();
                const orbitSpeed = item.parent.userData.rotationSpeed || 0.001;
                
                // Get Parent World Quaternion for transforming forces to Parent Space (where position is defined)
                const parentWorldQuat = new THREE.Quaternion();
                item.parent.getWorldQuaternion(parentWorldQuat);

                return {
                    item: item,
                    pos: worldPos,
                    axis: axis,
                    orbitSpeed: orbitSpeed,
                    parentWorldQuat: parentWorldQuat,
                    localVel: item.userData.velocity // Reference
                };
            });

            // 2. Predictive Path Planning (Collision Avoidance)
            // Complexity: O(N_items^2 * Prediction_Frames) 
            // 9 items * 9 items * 20 frames = ~1600 checks (Very Fast, <1ms)
            
            for (let i = 0; i < state.length; i++) {
                const objA = state[i];
                let steerForce = new THREE.Vector3();
                let collisionDetected = false;

                // Predict Future N Frames
                // Step size 2 for optimization without losing much precision
                for (let t = 1; t <= PHYSICS.predictionFrames; t += 2) { 
                    // Predict A Position: Orbit Rotation + Local Velocity Drift
                    // Formula: P_future = RotateAroundAxis(P_current, axis, speed*t) + V_local_world * t
                    
                    const timeOffset = t; // Arbitrary time unit
                    
                    // 1. Orbit Motion Prediction
                    const angleA = objA.orbitSpeed * timeOffset;
                    const predictedPosA = objA.pos.clone().applyAxisAngle(objA.axis, angleA);
                    
                    // 2. Local Velocity Prediction (Drift)
                    // Transform local velocity to world, then add
                    const localVelWorld = objA.localVel.clone().applyQuaternion(objA.parentWorldQuat);
                    predictedPosA.add(localVelWorld.multiplyScalar(timeOffset));

                    // Check vs Other Items
                    for (let j = 0; j < state.length; j++) {
                        if (i === j) continue;
                        const objB = state[j];
                        
                        // Predict B Position
                        const angleB = objB.orbitSpeed * timeOffset;
                        const predictedPosB = objB.pos.clone().applyAxisAngle(objB.axis, angleB);
                        const localVelWorldB = objB.localVel.clone().applyQuaternion(objB.parentWorldQuat);
                        predictedPosB.add(localVelWorldB.multiplyScalar(timeOffset));

                        const dist = predictedPosA.distanceTo(predictedPosB);
                        if (dist < PHYSICS.interactionRadius) {
                            // Potential Collision found at time t
                            // Steering Force: Separation
                            const dir = predictedPosA.clone().sub(predictedPosB).normalize();
                            
                            // Weight by proximity in time (closer in time = more urgent)
                            // Early avoidance is smoother (Minimum Adjustment Principle)
                            const urgency = 1.0 - (t / PHYSICS.predictionFrames);
                            steerForce.add(dir.multiplyScalar(urgency * PHYSICS.repulsionStrength));
                            collisionDetected = true;
                        }
                    }

                    // Check vs Central Text
                    if (centralTextCollider) {
                        // Use a safe radius for Central Text (Approx 6.0 units)
                        if (predictedPosA.length() < 6.0) {
                             const dir = predictedPosA.clone().normalize();
                             const urgency = 1.0 - (t / PHYSICS.predictionFrames);
                             steerForce.add(dir.multiplyScalar(urgency * PHYSICS.repulsionStrength * 2));
                             collisionDetected = true;
                        }
                    }
                    
                    if (collisionDetected) break; // React to first imminent threat
                }

                // 3. Apply Avoidance Forces with Constraints
                if (collisionDetected) {
                    // Transform World Steer Force back to Parent Space
                    const localSteer = steerForce.clone().applyQuaternion(objA.parentWorldQuat.clone().invert());
                    
                    // Constraint: Max Force (Smoothness) - "Minimum Adjustment"
                    localSteer.clampLength(0, PHYSICS.maxSteerForce);
                    
                    // Apply to velocity
                    objA.localVel.add(localSteer);
                }
            }

            // 4. Integration & Spring Dynamics
            state.forEach(obj => {
                // Spring force (Return to orbit slot)
                // Hooke's Law: F = -k * x
                const displacement = obj.item.position.clone().sub(obj.item.userData.orbitPos);
                const springForce = displacement.multiplyScalar(-PHYSICS.springStiffness);
                obj.localVel.add(springForce);

                // Damping (Friction)
                obj.localVel.multiplyScalar(PHYSICS.friction);

                // Constraint: Speed Change Limit 
                // "Ensure speed change is within 15%"
                // We clamp the max velocity deviation to prevent explosions
                obj.localVel.clampLength(0, 0.5); 

                // Update Position
                obj.item.position.add(obj.localVel);
            });

            // Performance Monitor
            const elapsed = performance.now() - startTime;
            if (elapsed > 10) {
                // console.warn("Physics took too long:", elapsed);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Rotate rings
            rings.forEach(ring => {
                ring.rotation.y += ring.userData.rotationSpeed;
                
                // Rotate items inside
                ring.children.forEach(item => {
                    if (item.userData.rotationAxis) {
                        item.rotateOnAxis(item.userData.rotationAxis, item.userData.rotationSpeed);
                    }
                });
            });

            updatePhysics();

            if (particleSystem) {
                particleSystem.rotation.y += 0.0005;
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
